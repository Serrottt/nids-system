services:
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "3000:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./logs:/var/log/nginx
    depends_on:
      - juice-shop
    restart: unless-stopped

  juice-shop:
    image: bkimminich/juice-shop:latest
    container_name: juice-shop
    expose:
      - "3000"
    restart: unless-stopped

  nids:
    build: .
    container_name: nids
    ports:
      - "5000:5000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs:ro
    environment:
      - JUICE_SHOP_URL=http://nginx:80
    depends_on:
      - nginx
      - juice-shop
    restart: unless-stopped